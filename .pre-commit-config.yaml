# Run with `pre-commit run --all-files` once, then it runs on every commit.
# Install with `make hooks` (see Makefile).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
        exclude: ^frontend-web/tsconfig\.json$  # contains comments
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # --- Python ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # --- JS/TS/JSON/Markdown ---
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^(frontend-web|frontend-mobile|shared)/.*\.(ts|tsx|js|jsx|json|md|yaml|yml|css)$
        exclude: ^.*/(node_modules|dist|build|\.expo)/

  # --- Web ESLint (only changed files for speed) ---
  - repo: local
    hooks:
      - id: eslint-web
        name: eslint (frontend-web)
        entry: bash -c 'cd frontend-web && npx eslint --max-warnings 0 "$@"' --
        language: system
        files: ^frontend-web/(src|cypress)/.*\.(ts|tsx)$
        require_serial: true
        pass_filenames: true
