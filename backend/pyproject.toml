[project]
name = "threadloop-backend"
version = "0.1.0"
description = "ThreadLoop API — FastAPI + SQLAlchemy + Alembic"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "sqlalchemy>=2.0",
    "psycopg[binary]>=3.2",
    "alembic>=1.13",
    "pydantic>=2.9",
    "pydantic-settings>=2.5",
    "python-multipart>=0.0.12",
    "redis>=5.0",
    "httpx>=0.27",
    "authlib>=1.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "ruff>=0.7",
    "mypy>=1.13",
    "testcontainers[postgres]>=4.8",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["app"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "SIM"]
ignore = [
    "E501",  # line length handled by formatter
    "B008",  # FastAPI dependency injection idiom: Depends() in defaults
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.lint.per-file-ignores]
# Alembic auto-generated revisions use the legacy typing module + their own import order.
"alembic/versions/*" = ["UP007", "UP035", "I001"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra --strict-markers"
markers = [
    "integration: tests that require a real database via Testcontainers; auto-skipped if Docker is unreachable",
]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
# `authlib` ships no PEP 561 stubs and `types-Authlib` covers only a small
# subset (notably not `authlib.jose`). Suppress the missing-stub errors here
# rather than silencing them line-by-line at every call site.
module = ["authlib.*"]
ignore_missing_imports = true
