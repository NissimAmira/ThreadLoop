openapi: 3.1.0
info:
  title: ThreadLoop API
  version: 0.1.0
  description: |
    Source-of-truth contract for the ThreadLoop marketplace API.
    The TypeScript types in `shared/src/types` mirror this spec.
servers:
  - url: http://localhost:8000
    description: Local dev
  - url: https://api.threadloop.example
    description: Production

tags:
  - name: health
  - name: auth
  - name: users
  - name: listings
  - name: search
  - name: transactions

paths:
  /api/health:
    get:
      tags: [health]
      summary: Service + dependency health check
      responses:
        "200":
          description: Always 200; consult `status` field.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }

  /api/auth/{provider}/callback:
    post:
      tags: [auth]
      summary: Exchange a provider credential for a ThreadLoop session
      description: |
        Single endpoint that dispatches by `provider` path parameter.
        The request body shape varies by provider (see `SsoCallbackInput`):
          - `google`:   `{ id_token }`
          - `apple`:    `{ id_token, code, name? }`
          - `facebook`: `{ access_token }`

        On success, returns a `Session` and sets a `Set-Cookie: refresh_token=…`
        header (httpOnly, Secure, SameSite=Lax, 30-day rolling lifetime).

        On a verified-email collision with an existing account from a different
        provider, returns `200` with `link_required: true` and a short-lived
        `link_token`; the client should prompt the user to re-authenticate
        with the original provider to confirm linking.
      parameters:
        - in: path
          name: provider
          required: true
          schema: { $ref: "#/components/schemas/AuthProvider" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SsoCallbackInput" }
      responses:
        "200":
          description: |
            Session created (or pending-link state — see `link_required`).
            Refresh token set as httpOnly cookie when not pending-link.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "400":
          description: Malformed request (missing required field for provider).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: Provider token signature invalid or expired.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404":
          description: Unknown provider in path.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          description: Provider JWKS unreachable; client should retry.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/auth/refresh:
    post:
      tags: [auth]
      summary: Issue a new access token using the refresh cookie
      description: |
        Reads the `refresh_token` httpOnly cookie, rotates it (revoking the
        old one server-side and issuing a new one), and returns a new access
        JWT in the body. No request body.

        Refresh-token reuse (an already-rotated token presented again) is
        treated as likely token theft: all of that user's refresh tokens are
        revoked and `401` is returned.
      responses:
        "200":
          description: New session issued; refresh cookie rotated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "401":
          description: |
            Missing, expired, revoked, or reused refresh token.
            Client should restart the SSO flow.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/auth/logout:
    post:
      tags: [auth]
      summary: Revoke the current refresh token and clear the cookie
      description: |
        Revokes the refresh token associated with the current cookie and
        unsets the cookie via `Set-Cookie: refresh_token=; Max-Age=0`.
        Idempotent — returns `204` even if no cookie was sent.
      responses:
        "204": { description: Logged out (cookie cleared). }

  /api/me:
    get:
      tags: [users]
      summary: Get the currently authenticated user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401":
          description: Missing or invalid access token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/listings:
    get:
      tags: [listings]
      summary: List active listings (cursor pagination)
      parameters:
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Page of listings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListingPage" }
    post:
      tags: [listings]
      summary: Create a new listing (seller capability required)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateListingInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Listing" }

  /api/listings/{id}:
    get:
      tags: [listings]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Listing detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Listing" }
        "404": { description: Not found }

  /api/search:
    get:
      tags: [search]
      summary: Faceted search backed by Meilisearch
      parameters:
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: brand, schema: { type: string } }
        - { in: query, name: category, schema: { type: string } }
        - { in: query, name: size, schema: { type: string } }
        - { in: query, name: condition, schema: { type: string, enum: [new, like_new, good, fair] } }
        - { in: query, name: min_price, schema: { type: integer } }
        - { in: query, name: max_price, schema: { type: integer } }
        - { in: query, name: page, schema: { type: integer, default: 1 } }
      responses:
        "200":
          description: Search hits + facets
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchResult" }

  /api/transactions:
    post:
      tags: [transactions]
      summary: Open a pending purchase for a listing
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [listing_id]
              properties:
                listing_id: { type: string, format: uuid }
      responses:
        "201":
          description: Pending transaction created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Transaction" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    DependencyStatus:
      type: string
      enum: [ok, degraded, down]

    HealthResponse:
      type: object
      required: [status, version, db, redis, meili]
      properties:
        status:  { $ref: "#/components/schemas/DependencyStatus" }
        version: { type: string }
        db:      { $ref: "#/components/schemas/DependencyStatus" }
        redis:   { $ref: "#/components/schemas/DependencyStatus" }
        meili:   { $ref: "#/components/schemas/DependencyStatus" }

    Error:
      type: object
      required: [code, message]
      properties:
        code:    { type: string, description: "Stable machine-readable error code." }
        message: { type: string, description: "Human-readable detail; safe to surface." }
        request_id:
          type: string
          description: "Server-assigned request id for log correlation."

    AuthProvider:
      type: string
      enum: [google, apple, facebook]

    GoogleSsoCallbackInput:
      type: object
      required: [id_token]
      properties:
        id_token: { type: string, description: "Google-issued ID token (JWT)." }

    AppleSsoCallbackInput:
      type: object
      required: [id_token, code]
      properties:
        id_token: { type: string, description: "Apple-issued ID token (JWT)." }
        code:     { type: string, description: "Apple authorization code; used to redeem an Apple refresh token server-side." }
        name:
          type: string
          nullable: true
          description: |
            User's display name as surfaced by Apple's JS SDK / native flow on
            the first sign-in only (and only when the app requested the `name`
            scope). Subsequent sign-ins omit it entirely; the backend reuses
            the existing `users.display_name` in that case.

    FacebookSsoCallbackInput:
      type: object
      required: [access_token]
      properties:
        access_token: { type: string, description: "Facebook user access token (resolved against Graph API server-side)." }

    SsoCallbackInput:
      description: |
        Provider-specific request body. Backend validates against the variant
        matching the `provider` path parameter.
      oneOf:
        - $ref: "#/components/schemas/GoogleSsoCallbackInput"
        - $ref: "#/components/schemas/AppleSsoCallbackInput"
        - $ref: "#/components/schemas/FacebookSsoCallbackInput"

    User:
      type: object
      required: [id, provider, display_name, email_verified, can_sell, can_purchase, created_at, updated_at]
      properties:
        id:             { type: string, format: uuid }
        provider:       { $ref: "#/components/schemas/AuthProvider" }
        email:          { type: string, nullable: true, description: "May be null when Apple withholds the address." }
        email_verified: { type: boolean }
        display_name:   { type: string }
        avatar_url:     { type: string, nullable: true, format: uri }
        can_sell:       { type: boolean }
        can_purchase:   { type: boolean }
        seller_rating:  { type: number, nullable: true, minimum: 0, maximum: 5 }
        created_at:     { type: string, format: date-time }
        updated_at:     { type: string, format: date-time }

    Session:
      type: object
      description: |
        Result of a successful authentication. When `link_required` is `true`,
        the existing-account collision flow has fired: `access_token`/`user`
        are absent and the client must surface a "sign in with {existing
        provider} to link" prompt, then submit `link_token` alongside the
        re-auth result. On the happy path, `link_required` is `false` (or
        omitted) and `access_token`/`expires_at`/`user` are all present.
      required: [link_required]
      properties:
        access_token:
          type: string
          description: "Short-lived (15 min) access JWT. Absent when link_required is true."
        expires_at:
          type: string
          format: date-time
          description: "Access token expiry. Absent when link_required is true."
        user:
          allOf:
            - $ref: "#/components/schemas/User"
          description: "Authenticated user. Absent when link_required is true."
        link_required:
          type: boolean
          default: false
          description: "True when the email collides with an existing account from a different provider; client must prompt the user to re-authenticate with that provider to link."
        link_provider:
          $ref: "#/components/schemas/AuthProvider"
          description: "Existing provider the user must re-authenticate with. Present iff link_required is true."
        link_token:
          type: string
          description: "Short-lived token submitted alongside the linking re-auth to confirm the merge. Present iff link_required is true."

    ListingImage:
      type: object
      required: [id, position, url]
      properties:
        id:       { type: string, format: uuid }
        position: { type: integer }
        url:      { type: string, format: uri }
        width:    { type: integer, nullable: true }
        height:   { type: integer, nullable: true }

    ListingArAsset:
      type: object
      required: [glb_low_url, glb_high_url]
      properties:
        glb_low_url:  { type: string, format: uri }
        glb_high_url: { type: string, format: uri }
        processed_at: { type: string, format: date-time, nullable: true }

    Listing:
      type: object
      required:
        [id, seller_id, title, category, condition, price_cents, currency, status, images]
      properties:
        id:          { type: string, format: uuid }
        seller_id:   { type: string, format: uuid }
        title:       { type: string }
        description: { type: string, nullable: true }
        brand:       { type: string, nullable: true }
        category:    { type: string }
        size:        { type: string, nullable: true }
        condition:   { type: string, enum: [new, like_new, good, fair] }
        price_cents: { type: integer, minimum: 1 }
        currency:    { type: string, minLength: 3, maxLength: 3 }
        status:      { type: string, enum: [draft, active, sold, removed] }
        images:      { type: array, items: { $ref: "#/components/schemas/ListingImage" } }
        ar_asset:    { $ref: "#/components/schemas/ListingArAsset", nullable: true }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    CreateListingInput:
      type: object
      required: [title, category, condition, price_cents]
      properties:
        title:       { type: string, maxLength: 200 }
        description: { type: string }
        brand:       { type: string }
        category:    { type: string }
        size:        { type: string }
        condition:   { type: string, enum: [new, like_new, good, fair] }
        price_cents: { type: integer, minimum: 1 }
        currency:    { type: string, default: "USD" }

    ListingPage:
      type: object
      required: [items, next_cursor]
      properties:
        items:       { type: array, items: { $ref: "#/components/schemas/Listing" } }
        next_cursor: { type: string, nullable: true }

    SearchResult:
      type: object
      required: [hits, facets, page, total_pages, total_hits]
      properties:
        hits:
          type: array
          items:
            allOf:
              - $ref: "#/components/schemas/Listing"
              - type: object
                properties:
                  score: { type: number }
        facets:
          type: object
          properties:
            brand:     { type: object, additionalProperties: { type: integer } }
            category:  { type: object, additionalProperties: { type: integer } }
            size:      { type: object, additionalProperties: { type: integer } }
            condition: { type: object, additionalProperties: { type: integer } }
        page:        { type: integer }
        total_pages: { type: integer }
        total_hits:  { type: integer }

    Transaction:
      type: object
      required:
        [id, listing_id, buyer_id, seller_id, amount_cents, currency, status]
      properties:
        id:           { type: string, format: uuid }
        listing_id:   { type: string, format: uuid }
        buyer_id:     { type: string, format: uuid }
        seller_id:    { type: string, format: uuid }
        amount_cents: { type: integer }
        currency:     { type: string, minLength: 3, maxLength: 3 }
        status:
          type: string
          enum: [pending, paid, shipped, delivered, disputed, refunded]
        created_at:   { type: string, format: date-time }
        updated_at:   { type: string, format: date-time }
