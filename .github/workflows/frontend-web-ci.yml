name: Web CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-web/package.json

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      # Validate the production image builds. Context is the repo root
      # because the Dockerfile copies from both shared/ and frontend-web/.
      # We don't push it — push wires up in the first deploy phase per
      # docs/devops-roadmap.md.
      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}
          file: frontend-web/Dockerfile.prod
          push: false
          tags: threadloop-web:ci
